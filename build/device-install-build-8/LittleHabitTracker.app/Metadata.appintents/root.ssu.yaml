apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: com.xiaodao.LittleHabitTracker
    intents:
    - metadata:
        name: CheckinHabitIntent_0
        title: 打卡习惯
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Check in habit in ${+applicationName}'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - TickDay
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
