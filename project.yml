name: LittleHabitTracker
options:
  bundleIdPrefix: com.xiaodao
  deploymentTarget:
    iOS: 17.0
targets:
  LittleHabitTracker:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: Sources/LittleHabitTracker.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.xiaodao.LittleHabitTracker
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
