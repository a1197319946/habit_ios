<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bloom - Add Habit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "inverse-on-surface": "#f3f0f5",
                        "surface-container-low": "#f6f2f8",

                        "secondary": "#2a6951",

                        "on-tertiary-container": "#492e19",
                        "on-tertiary-fixed-variant": "#5f402a",
                        "error-container": "#ffdad6",

                        "primary-fixed-dim": "#c8bfff",
                        "primary-fixed": "#e5deff",
                        "on-error": "#ffffff",
                        "surface-variant": "#e4e1e7",
                        "secondary-container": "#aceece",
                        "secondary-fixed-dim": "#94d4b6",
                        "on-surface": "#1b1b1f",
                        "tertiary-fixed-dim": "#eabea0",
                        "on-secondary-fixed-variant": "#09513a",
                        "surface": "#fbf8fe",
                        "outline": "#787584",
                        "surface-container-highest": "#e4e1e7",
                        "on-primary-fixed": "#1a0064",

                        "on-secondary-fixed": "#002115",

                    },
                    "borderRadius": {

                    },
                    "spacing": {

                        "md": "24px",
                        "xl": "80px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "xs": "4px",
                        "base": "8px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display": ["Plus Jakarta Sans"],

                }
            }
        }

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 1);
        }

        .input-focus-glow:focus-within {
            box-shadow: 0 0 0 4px theme('colors.primary-fixed');
            border-color: theme('colors.primary');
        }
        
        .gradient-primary {
            background: linear-gradient(135deg, #9D8DFF 0%, #B5A8FF 100%);
        }

        /* Material Symbols Outline Base */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-white/20 shadow-sm transition-colors duration-300 px-margin-mobile md:px-xl h-16 max-w-container-max mx-auto flex justify-between items-center">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-bold">New Habit</h1>
</div>
<div class="flex items-center">
<button class="w-10 h-10 rounded-full overflow-hidden hover:bg-primary/10 transition-colors active:scale-95 duration-200 flex items-center justify-center">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close up headshot of a smiling young professional woman with light brown hair in a bright, sunny outdoor setting. The light mode aesthetic is evident with soft, diffused sunlight and a completely blurred background featuring pastel greens and whites. The overall mood is optimistic, airy, and fresh, matching a premium app interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCb-bvXYNT2C9yEwK2QkEB_ULqGlM_sbBoWD9tgGgyOHub02L-_W_Gb6najlYq1Bh4opZVIlO-_dxM3a8GnmSQinbpaQzCit-KZkk0BxPvP6aTQ1YEGRlkSOcCWshec1LH6Em9P0Kee8yKha248xfTdjYfMxwtS6QA6xwgzzUvskaS-pWoCt_WV_wiHxyid0KQ0YERzmzcePW_X3D9ujrJ9BAoLfDRKkU5FWlcgj3y7lzjC6Wqmuye7F2aFPnLd0-R6-RctlOTKA5g"/>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-mobile md:px-md max-w-container-max mx-auto space-y-md">
<!-- Form Container Glass Card -->
<div class="glass-card rounded-[24px] p-md shadow-[0px_20px_40px_rgba(157,141,255,0.08)]">
<form class="space-y-lg">
<!-- Habit Name Input -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block">What do you want to build?</label>
<div class="relative bg-white/90 border border-outline-variant rounded-lg flex items-center p-sm input-focus-glow transition-all duration-200">
<span class="material-symbols-outlined text-outline mr-sm">edit</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md placeholder:text-outline-variant outline-none" placeholder="e.g. Read 10 pages, Drink water..." required="" type="text"/>
</div>
</div>
<!-- Color Theme Picker -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block">Pick a Theme Color</label>
<div class="flex gap-sm overflow-x-auto pb-2 scrollbar-hide">
<!-- Color Options -->
<button class="w-12 h-12 rounded-full bg-[#9D8DFF] flex-shrink-0 flex items-center justify-center ring-2 ring-primary ring-offset-2 transition-transform active:scale-90" type="button">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
<button class="w-12 h-12 rounded-full bg-[#A2E3C4] flex-shrink-0 flex items-center justify-center hover:scale-105 transition-transform active:scale-90" type="button"></button>
<button class="w-12 h-12 rounded-full bg-[#FFC5A3] flex-shrink-0 flex items-center justify-center hover:scale-105 transition-transform active:scale-90" type="button"></button>
<button class="w-12 h-12 rounded-full bg-[#A3CCFF] flex-shrink-0 flex items-center justify-center hover:scale-105 transition-transform active:scale-90" type="button"></button>
<button class="w-12 h-12 rounded-full bg-[#FFA3C2] flex-shrink-0 flex items-center justify-center hover:scale-105 transition-transform active:scale-90" type="button"></button>
<button class="w-12 h-12 rounded-full bg-[#E5DEFF] flex-shrink-0 flex items-center justify-center border border-outline-variant hover:scale-105 transition-transform active:scale-90" type="button"></button>
</div>
</div>
<!-- Icon Picker (Simplified) -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block">Choose an Icon</label>
<div class="grid grid-cols-5 md:grid-cols-8 gap-sm">
<!-- Active Icon -->
<button class="aspect-square rounded-xl bg-primary-container flex items-center justify-center text-on-primary-container transition-transform active:scale-90" type="button">
<span class="material-symbols-outlined text-2xl">book</span>
</button>
<!-- Inactive Icons -->
<button class="aspect-square rounded-xl bg-surface-container-low border border-outline-variant flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-90" type="button">
<span class="material-symbols-outlined text-2xl">water_drop</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low border border-outline-variant flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-90" type="button">
<span class="material-symbols-outlined text-2xl">fitness_center</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low border border-outline-variant flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-90" type="button">
<span class="material-symbols-outlined text-2xl">bedtime</span>
</button>
<button class="aspect-square rounded-xl bg-surface-container-low border border-outline-variant flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-90" type="button">
<span class="material-symbols-outlined text-2xl">self_improvement</span>
</button>
</div>
</div>
<!-- Goal Type Toggle -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block">Goal Type</label>
<div class="flex bg-surface-container-low p-1 rounded-xl">
<button class="flex-1 py-2 text-center rounded-lg bg-white shadow-sm text-primary font-label-md text-label-md transition-all" type="button">Frequency</button>
<button class="flex-1 py-2 text-center rounded-lg text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant/50 transition-all" type="button">Total Amount</button>
</div>
</div>
<!-- Stepper for Target Number -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block">Target (per week)</label>
<div class="flex items-center justify-between bg-surface-container-low rounded-xl p-sm border border-outline-variant">
<button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="text-center">
<span class="font-headline-lg text-headline-lg text-on-surface block">3</span>
<span class="font-label-sm text-label-sm text-on-surface-variant block mt-1">Times</span>
</div>
<button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full gradient-primary text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 duration-200" type="button">
                        Create Habit
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Suppressed as this is a linear/task-focused flow implied by 'Add Habit' and the 'Back' arrow) -->
</body></html>
